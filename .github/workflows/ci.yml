name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-main:
    name: Lint & Type Check (main)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: main/package-lock.json

      - name: 패키지 설치
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript 타입 검사
        run: npx tsc --noEmit

  build-main:
    name: Build (main)
    runs-on: ubuntu-latest
    needs: lint-main
    defaults:
      run:
        working-directory: main
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_TOSS_CLIENT_KEY: ${{ secrets.NEXT_PUBLIC_TOSS_CLIENT_KEY }}
      TOSS_SECRET_KEY: ${{ secrets.TOSS_SECRET_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: main/package-lock.json

      - name: 패키지 설치
        run: npm ci

      - name: Next.js 빌드
        run: npm run build

  lint-admin:
    name: Lint & Type Check (admin)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: 패키지 설치
        run: npm ci

      - name: TypeScript 타입 검사
        run: npx tsc --noEmit
